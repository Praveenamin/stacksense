name: Build Windows agent exe

# The StackSense server runs on Linux/Docker and cannot compile a Windows .exe, so the
# standalone agent binary is built here on a Windows runner. On a tag it is also attached
# to a GitHub Release, so the server can fetch it with:
#   gh release download <tag> -p stacksense-agent.exe -D agent/ --clobber
# (run once per agent version; served by /agent/stacksense-agent.exe). Manual runs
# (workflow_dispatch) still produce the downloadable artifact.

on:
  push:
    tags: ["agent-v*", "v*"]
  workflow_dispatch: {}

permissions:
  contents: write          # needed to create the Release on a tag

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: pip install pyinstaller psutil certifi

      - name: Build one-file exe
        run: >
          pyinstaller --onefile --name stacksense-agent
          --hidden-import=psutil._pswindows
          agent/stacksense_agent.py

      - name: Smoke test (collect one sample, no server)
        env:
          STACKSENSE_URL: https://example.invalid
          STACKSENSE_TOKEN: ci-smoke
        run: ./dist/stacksense-agent.exe --dry-run

      - uses: actions/upload-artifact@v4
        with:
          name: stacksense-agent-exe
          path: dist/stacksense-agent.exe
          if-no-files-found: error

      - name: Publish to a GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/stacksense-agent.exe
          fail_on_unmatched_files: true

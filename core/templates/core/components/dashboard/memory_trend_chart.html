{% comment %}
Memory Usage Trend Chart Component (24h)
{% endcomment %}

{% load static %}
{% include "core/components/cpu_utilization_chart_js.html" %}

<div class="dashboard-component" id="dashboard-memory-trend">
    <div class="dashboard-component-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
        <div style="display: flex; align-items: center; gap: var(--cds-spacing-2, 8px);">
            <span class="dashboard-component-icon">💾</span>
            <h3 class="dashboard-component-title">Memory Usage Trend</h3>
            <button type="button" id="memory-trend-popout" title="Expand"
                    style="border:none;background:transparent;cursor:pointer;color:#94a3b8;padding:2px;line-height:0;">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>
            </button>
        </div>
        <div style="display: flex; gap: 12px; align-items: center;">
            <!-- Time Period Filter -->
            <div style="display: flex;">
                <button class="chart-period-btn active" data-chart="memory" data-period="24h">24h</button>
                <button class="chart-period-btn" data-chart="memory" data-period="7d">7 Days</button>
                <button class="chart-period-btn" data-chart="memory" data-period="30d">30 Days</button>
            </div>
            <!-- Server Filter (Overall = All VMs average, or pick a single server) -->
            <div class="dashboard-filter-selector" id="memory-trend-filter-container">
                <button class="dashboard-filter-button" id="memory-trend-filter-button" type="button">
                    <span class="filter-icon" style="font-size: 11px;">⚙</span>
                    <span class="chart-icon" style="font-size: 13px;">📊</span>
                    <span class="filter-text" id="memory-trend-filter-text">All VMs (Average)</span>
                    <span class="filter-arrow">▼</span>
                </button>
                <div class="dashboard-filter-dropdown" id="memory-trend-filter-dropdown" style="display: none;">
                    <div class="filter-option" data-value="all">
                        <span>All VMs (Average)</span>
                        <span class="filter-check" style="display: none;">✓</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <p class="dashboard-component-subtitle">Real-time memory utilization monitoring</p>
    <div class="dashboard-component-content" id="dashboard-content-memory-trend">

        <div class="chart-container">
            <canvas id="memory-trend-chart"></canvas>
        </div>
        <div class="chart-summary">
            <div class="chart-summary-item">
                <div class="chart-summary-label">Average</div>
                <div class="chart-summary-value" id="memory-average">—</div>
            </div>
            <div class="chart-summary-item">
                <div class="chart-summary-label">Minimum</div>
                <div class="chart-summary-value" id="memory-min">—</div>
            </div>
            <div class="chart-summary-item">
                <div class="chart-summary-label">Maximum</div>
                <div class="chart-summary-value" id="memory-max">—</div>
            </div>
        </div>
    </div>
    <div class="dashboard-loading" id="dashboard-loading-memory-trend" style="display: none;">
        <div class="loading-spinner"></div>
        <span>Loading...</span>
    </div>
    <div class="dashboard-error" id="dashboard-error-memory-trend" style="display: none;">
        <span id="dashboard-error-message-memory-trend"></span>
    </div>
</div>

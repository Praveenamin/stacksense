{% comment %}
Anomalies bell icon for the top bar. Pairs with anomaly_bell_panel.html (which defines
window.toggleAnomalyPanel + loads the count/list). Drop into a {% block topbar_right %}.
{% endcomment %}
<button type="button" id="anomaly-bell-btn" class="insight-icon" onclick="toggleAnomalyPanel(this)" title="Anomalies">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
    <span class="insight-badge" id="anomaly-bell-count" style="display:none;background:#c2410c;"></span>
</button>

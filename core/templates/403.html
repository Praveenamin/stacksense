<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Access denied — Stack Alert</title>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background:#f8fafc; color:#0f172a; margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        main { background:#fff; border:1px solid #e2e8f0; border-radius:12px; padding:40px 36px; max-width:460px; text-align:center; box-shadow:0 1px 3px rgba(15,23,42,.06); }
        .badge { font-size:13px; font-weight:600; color:#b91c1c; background:#fef2f2; border:1px solid #fecaca; border-radius:999px; padding:4px 12px; display:inline-block; }
        h1 { font-size:22px; margin:16px 0 8px; }
        p { font-size:14px; color:#475569; line-height:1.55; margin:0 0 20px; }
        a.btn { display:inline-block; background:#0f62fe; color:#fff; text-decoration:none; font-size:14px; font-weight:600; padding:10px 20px; border-radius:8px; }
        a.btn:focus-visible { outline:3px solid #93c5fd; outline-offset:2px; }
    </style>
</head>
<body>
    <main role="main">
        <span class="badge">403 — Access denied</span>
        <h1>You don't have permission to view this</h1>
        <p>Your role doesn't include access to this page or action. If you think this is a mistake, contact an administrator.</p>
        <a class="btn" href="/">Return to dashboard</a>
    </main>
</body>
</html>

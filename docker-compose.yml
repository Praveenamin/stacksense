services:
  db:
    image: postgres:15-alpine
    container_name: monitoring_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-monitoring_db}
      POSTGRES_USER: ${POSTGRES_USER:-monitoring_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - stacksense_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - stacksense_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monitoring_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: monitoring_redis
    volumes:
      - stacksense_redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - stacksense_network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: monitoring_ollama
    volumes:
      - ollama_data:/root/.ollama
    # Do NOT publish 11434 to the host — Ollama is likely running natively on the host (port 11434).
    # This container is reachable from the web service at http://ollama:11434. To use it, set in .env:
    #   OLLAMA_API_URL=http://ollama:11434
    # If you use host Ollama instead, leave OLLAMA_API_URL as-is (e.g. http://10.1.1.126:11434 or host.docker.internal:11434) and you can stop this service.
    networks:
      - stacksense_network
    restart: unless-stopped
    # The official ollama image does NOT include curl; use ollama CLI instead.
    # Ollama needs 4–8GB+ RAM when a model is loaded (e.g. phi3, llama3.2).
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 90s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monitoring_web
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput &&
        nohup python3 metrics_scheduler.py > /tmp/metrics_scheduler.log 2>&1 &
        gunicorn log_analyzer.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 180
      "
    volumes:
      - .:/app
      - stacksense_static:/app/staticfiles
      - stacksense_media:/app/media
    ports:
      # Bound to localhost only: external traffic must go through the nginx reverse
      # proxy (TLS). A host-level nginx still reaches the app via 127.0.0.1:8000.
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - stacksense_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "manage.py", "check"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  stacksense_postgres_data:
  stacksense_redis_data:
  stacksense_static:
  stacksense_media:
  ollama_data:

networks:
  stacksense_network:
    driver: bridge








